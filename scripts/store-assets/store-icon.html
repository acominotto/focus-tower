<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 128px;
        height: 128px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 58%, rgba(255, 107, 53, 0.35) 0%, transparent 52%),
          radial-gradient(circle at 50% 50%, #2a1510 0%, #140a08 55%, #0a0604 100%);
        display: grid;
        place-items: center;
      }

      .eye {
        width: 104px;
        height: 104px;
        image-rendering: pixelated;
        filter: drop-shadow(0 0 14px rgba(255, 107, 53, 0.55));
      }
    </style>
  </head>
  <body>
    <img class="eye" src="../../icons/icon128.png" width="104" height="104" alt="" />
  </body>
</html>
