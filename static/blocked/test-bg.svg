<svg id="mordor-bg"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 320 180"
    width="100vw"
    height="100vh"
    preserveAspectRatio="xMidYMid slice"
    shape-rendering="crispEdges"
    aria-hidden="true">
    <defs>
        <style>
      .sky-bg { animation: thunder 10s infinite; }
      @keyframes thunder {
        0%, 92%, 94%, 98%, 100% { fill: #0a0303; }
        93%, 97% { fill: #2d0b0b; }
      }

      .cloud-1 { fill: #170707; animation: drift 20s infinite linear; }
      .cloud-2 { fill: #1c0909; animation: drift 14s infinite linear reverse; }
      .cloud-3 { fill: #140606; animation: drift 18s infinite linear; opacity: 0.85; }
      @keyframes drift {
        0% { transform: translateX(-12px); }
        50% { transform: translateX(12px); }
        100% { transform: translateX(-12px); }
      }

      .lava-deep { animation: lava-1 0.55s infinite alternate; }
      .lava-bright { animation: lava-2 0.35s infinite alternate-reverse; }
      .lava-core { animation: lava-3 0.25s infinite alternate; }
      .caldera-glow { animation: caldera-pulse 2.2s infinite ease-in-out alternate; }

      @keyframes lava-1 {
        0% { fill: #7f1d1d; opacity: 0.85; }
        100% { fill: #991b1b; opacity: 1; }
      }
      @keyframes lava-2 {
        0% { fill: #c2410c; opacity: 0.75; }
        100% { fill: #ea580c; opacity: 1; }
      }
      @keyframes lava-3 {
        0% { fill: #ea580c; opacity: 0.8; }
        100% { fill: #fbbf24; opacity: 1; }
      }
      @keyframes caldera-pulse {
        0% { opacity: 0.65; }
        100% { opacity: 1; }
      }

      .smoke { fill: #1a0808; opacity: 0.55; animation: smoke-rise 12s infinite ease-in-out; }
      @keyframes smoke-rise {
        0%, 100% { transform: translateY(0); opacity: 0.45; }
        50% { transform: translateY(-6px); opacity: 0.65; }
      }

      .horizon-glow { animation: horizon-pulse 8s infinite ease-in-out alternate; }
      @keyframes horizon-pulse {
        0% { opacity: 0.55; }
        100% { opacity: 0.9; }
      }
        </style>

        <radialGradient id="doom-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ff6600" stop-opacity="0.55" />
            <stop offset="55%" stop-color="#991b1b" stop-opacity="0.2" />
            <stop offset="100%" stop-color="#0a0303" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- Sky -->
    <rect class="sky-bg" width="100%" height="100%" fill="#0a0303" />

    <!-- Distant ash clouds -->
    <path class="cloud-3" d="M0 28 h55 v10 h-28 v5 h-27 z M200 18 h70 v8 h-35 v4 h-35 z M120 42 h80 v9 h-40 v5 h-40 z" />
    <path class="cloud-1" d="M20 52 h60 v8 h-30 v4 h-30 z M240 38 h65 v7 h-32 v4 h-33 z M150 62 h90 v8 h-45 v4 h-45 z" />
    <path class="cloud-2" d="M60 78 h55 v6 h-22 v4 h-33 z M260 68 h50 v6 h-25 v4 h-25 z" />

    <!-- Volcanic glow on horizon -->
    <ellipse class="horizon-glow" cx="235" cy="158" rx="115" ry="38" fill="url(#doom-glow)" />

    <!-- Far ridgeline -->
    <path d="M 0 148 L 28 132 L 52 140 L 88 118 L 118 128 L 155 112 L 192 122 L 230 108 L 268 118 L 320 102 V 180 H 0 Z" fill="#0d0404" opacity="0.9" />
    <path d="M 0 158 L 36 146 L 72 152 L 108 136 L 148 144 L 188 130 L 228 138 L 268 128 L 320 140 V 180 H 0 Z" fill="#110505" />

    <!-- Mount Doom -->
    <g id="mount-doom" transform="translate(175, 0) scale(1.75, 1) translate(-18, 0)">
        <!-- Main cone -->
        <path d="M 18 168 L 42 108 L 58 72 L 72 48 L 82 168 Z" fill="#14100e" />
        <path d="M 42 168 L 58 108 L 68 72 L 76 56 L 88 168 Z" fill="#1a1412" />
        <path d="M 68 168 L 76 120 L 82 88 L 86 68 L 94 168 Z" fill="#120e0c" />

        <!-- Rocky facets -->
        <path d="M 42 108 L 58 72 L 68 108 L 52 128 Z" fill="#0f0c0a" opacity="0.7" />
        <path d="M 58 72 L 72 48 L 76 88 L 68 108 Z" fill="#1f1814" opacity="0.5" />
        <path d="M 28 148 L 38 128 L 48 148 Z" fill="#0a0806" />
        <path d="M 52 152 L 62 132 L 72 152 Z" fill="#0a0806" />

        <!-- Lava rivers -->
        <g class="lava-deep">
            <path d="M 74 92 L 76 108 L 78 128 L 80 148 L 82 168 H 78 L 76 148 L 74 128 L 72 108 Z" />
            <path d="M 52 128 L 54 142 L 56 156 L 58 168 H 54 L 52 154 L 50 140 Z" />
        </g>
        <g class="lava-bright">
            <path d="M 75 100 L 76 118 L 77 136 L 78 154 L 79 168 H 77 L 76 150 L 75 132 L 74 114 Z" />
            <path d="M 53 136 L 54 150 L 55 162 L 56 168 H 54 L 53 158 Z" />
        </g>
        <g class="lava-core">
            <path d="M 76 112 L 76 130 L 77 148 L 77 168 H 76 L 76 150 L 75 132 Z" />
            <rect x="75" y="156" width="2" height="12" />
        </g>

        <!-- Caldera rim -->
        <path d="M 66 52 L 72 48 L 78 52 L 76 58 L 70 58 Z" fill="#1a1412" />
        <path class="caldera-glow" d="M 68 54 L 72 50 L 76 54 L 74 56 L 70 56 Z" fill="#ea580c" />
        <rect class="lava-core" x="70" y="52" width="4" height="2" fill="#fbbf24" />

        <!-- Crater fire -->
        <g class="lava-bright">
            <rect x="69" y="53" width="2" height="1" />
            <rect x="73" y="53" width="2" height="1" />
            <rect x="71" y="54" width="2" height="1" />
        </g>

        <!-- Smoke plume -->
        <g class="smoke">
            <rect x="70" y="42" width="4" height="6" />
            <rect x="68" y="36" width="8" height="6" />
            <rect x="66" y="30" width="12" height="6" />
            <rect x="64" y="24" width="16" height="6" />
            <rect x="62" y="18" width="20" height="6" opacity="0.4" />
            <rect x="60" y="12" width="24" height="6" opacity="0.25" />
        </g>

        <!-- Base embers -->
        <g class="lava-deep">
            <rect x="24" y="162" width="6" height="6" />
            <rect x="44" y="164" width="8" height="4" />
            <rect x="62" y="166" width="5" height="2" />
        </g>
        <g class="lava-core">
            <rect x="26" y="164" width="2" height="2" />
            <rect x="46" y="165" width="3" height="2" />
        </g>
    </g>

    <!-- Mid-ground wasteland -->
    <path d="M 0 168 L 24 160 L 48 164 L 96 156 L 140 162 L 188 154 L 232 160 L 280 152 L 320 158 V 180 H 0 Z" fill="#160808" />
    <path d="M 0 174 L 40 168 L 88 172 L 136 166 L 184 170 L 240 164 L 288 168 L 320 172 V 180 H 0 Z" fill="#1e0c0c" />
</svg>
