name: Bug report
description: Report something that isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I visit a blocked site, ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: I expected to see the block page with a quote.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Add twitter.com to blocked sites
        2. Visit https://twitter.com
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Extension version
      description: From chrome://extensions or the popup/about page
      placeholder: "1.1.0"
    validations:
      required: true

  - type: dropdown
    id: install_source
    attributes:
      label: How did you install Focus Tower?
      options:
        - Chrome Web Store
        - Loaded unpacked from source
        - Other
    validations:
      required: true

  - type: input
    id: chrome
    attributes:
      label: Chrome version
      placeholder: e.g. 131.0.6778.86
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - ChromeOS
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, console errors from the service worker, etc.
